dpi-aware=no
icon-theme=Papirus-Dark
width=40
font=FiraCode Nerd Font:weight=bold:size=14
line-height=24
fields=name,generic,comment,categories,filename,keywords
terminal=kitty -e
prompt="❯   "
show-actions=yes
exit-on-keyboard-focus-loss=no


[colors]
background={{background | strip}}dd
text={{color6 | strip}}ff
prompt={{color3 | strip}}ff
placeholder={{color2 | strip}}ff
input={{color4 | strip}}ff
match={{color5 | strip}}ff
selection={{color6 | strip}}ff
selection-text={{foreground | strip}}ff
selection-match={{color15 | strip}}ff
counter={{color2 | strip}}ff
border={{color5 | strip}}ff

[border]
radius=20

[dmenu]
exit-immediately-if-empty=yes

